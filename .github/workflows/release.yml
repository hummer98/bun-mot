name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  verify-versions:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Verify package.json matches tag
        env:
          TAG_VERSION: ${{ steps.extract.outputs.version }}
        run: |
          PKG=$(node -p "require('./package.json').version")
          echo "tag=$TAG_VERSION package.json=$PKG"
          if [ "$PKG" != "$TAG_VERSION" ]; then
            echo "::error::version mismatch (tag=$TAG_VERSION package.json=$PKG)" >&2
            exit 1
          fi

  release:
    needs: verify-versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test (unit)
        run: bun run test:unit

      - name: Build
        run: bun run build

      - name: Publish to npm (OIDC Trusted Publishing)
        run: |
          # setup-node が書き込む _authToken プレースホルダを削除し OIDC 認証を使う
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG" 2>/dev/null || true
          # OIDC Trusted Publishing は npm >=11.5.1 必要。
          # Node 22 同梱の npm は 10.x なので npx で 11+ を取得して publish する。
          # prepublishOnly の二重実行を避けるため --ignore-scripts (build は上で完了済み)
          npx -y npm@11 publish --provenance --access public --ignore-scripts

      - name: Extract changelog and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md)
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "$NOTES"
